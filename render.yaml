# Render Blueprint — Bollywood Bingo (full app: React + Express API)
#
# IMPORTANT: This is a Node Web Service, NOT a static site.
# Do NOT set "Publish Directory" to "dist" in the Render dashboard.
# The site lives at dist/public/ and is served by Express via "npm start".

services:
  - type: web
    name: bollywood-bingo
    runtime: node
    plan: free
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.19.0"
